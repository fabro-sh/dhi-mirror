name: Mirror DHI to GHCR

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - source: dhi.io/alpine:3.22-dev
            repo: ghcr.io/fabro-sh/dhi-alpine
            tag: 3.22-dev
          - source: dhi.io/alpine:3.22
            repo: ghcr.io/fabro-sh/dhi-alpine
            tag: "3.22"
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to dhi.io
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ vars.DHI_USERNAME }}
          password: ${{ secrets.DHI_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute date tag
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Mirror ${{ matrix.image.source }}
        run: |
          docker buildx imagetools create \
            --tag ${{ matrix.image.repo }}:${{ matrix.image.tag }} \
            --tag ${{ matrix.image.repo }}:${{ matrix.image.tag }}-${{ steps.date.outputs.date }} \
            ${{ matrix.image.source }}

      - name: Show mirrored digest
        run: docker buildx imagetools inspect ${{ matrix.image.repo }}:${{ matrix.image.tag }}
