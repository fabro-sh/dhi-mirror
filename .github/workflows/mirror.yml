name: Mirror DHI to GHCR

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - source: dhi.io/alpine-base:3.23-dev
            repo: ghcr.io/fabro-sh/dhi-alpine-base
            tag: 3.23-dev
          - source: dhi.io/alpine-base:3.23
            repo: ghcr.io/fabro-sh/dhi-alpine-base
            tag: "3.23"
    env:
      DHI_USERNAME: ${{ vars.DHI_USERNAME }}
      DHI_TOKEN: ${{ secrets.DHI_TOKEN }}
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Login to dhi.io
        run: echo "$DHI_TOKEN" | docker login dhi.io -u "$DHI_USERNAME" --password-stdin

      - name: Login to GHCR
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

      - name: Compute date tag
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Mirror ${{ matrix.image.source }}
        run: |
          docker buildx imagetools create \
            --tag ${{ matrix.image.repo }}:${{ matrix.image.tag }} \
            --tag ${{ matrix.image.repo }}:${{ matrix.image.tag }}-${{ steps.date.outputs.date }} \
            ${{ matrix.image.source }}

      - name: Show mirrored digest
        run: docker buildx imagetools inspect ${{ matrix.image.repo }}:${{ matrix.image.tag }}
